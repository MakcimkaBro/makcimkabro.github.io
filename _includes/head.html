<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,700;0,900;1,900&display=swap');
    *{font-family: Roboto, serif;}
    .sitetag h2{font-family: Roboto, serif; font-style: italic;}
    .soc-link-footer ul{margin-left: 0; padding-left: 0; margin-bottom: 0px;}
    .soc-link-footer ul li{display: inline; list-style-type: none; font-size: 12px;}
  </style>

  <title>{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>

  <base href="{{site.baseurl}}"/>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="author" content="makcimka bro">

  <meta itemprop="description" name="description" content="{% if page.description %}{{ page.description | truncate: 160 }}{% else %}{{ site.description | truncate: 160  }}{% endif %}" />
  <meta name="keywords" content="{{ page.keywords }}" />

  <meta property="og:title" content="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}/thumbs/{{ page.image }}" />
  <meta property="og:site_name" content="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | truncate: 160 }}{% else %}{{ site.description | truncate: 160  }}{% endif %}"/>
  <meta property="og:locale" content="ru_RU">

  {% if page.layout == 'post' %}
  <meta property="og:type" content="article">
  <meta property="article:publisher" content="{{ page.date }}" />
  <meta property="article:author" content="{{ page.author }}" />
  <meta property="article:published_time" content="{{ page.date }}" />
  {% else %}
  <meta property="og:type" content="website">
  {% endif %}

  <meta name="twitter:card" content="{{ site.url }}/thumbs/{{ page.image }}"/>
  <meta name="twitter:title" content="{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:site" content="ссылка на профиль" />
  <meta name="twitter:creator" content="ссылка на профиль">
  <meta name="twitter:card" content="summary">

  <link rel="icon" href="{{ site.baseurl }}/{{ site.favicon }}">
  <link rel="apple-touch-icon-precomposed" href="{{ site.baseurl }}/{{ site.favicon }}">
  <link rel="apple-touch-icon-precomposed" sizes="60x60" href="{{ site.baseurl }}/{{ site.favicon }}">
  <link rel="apple-touch-icon-precomposed" sizes="114x114" href="{{ site.baseurl }}/{{ site.favicon }}">
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ site.baseurl }}/{{ site.favicon }}">

  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/slick.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/slick-theme.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/prism.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/theme.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/animate.min.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/include.css">

</head>
